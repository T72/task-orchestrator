name: validate

on:
  pull_request:
  push:
    branches: [ main, develop ]

jobs:
  repo-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check repo structure
        run: python scripts/check_repo_structure.py