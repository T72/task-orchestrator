name: Check Public Repo Drift

on:
  workflow_dispatch:
    inputs:
      public_repo:
        description: "owner/repo of public mirror"
        required: false
        default: "T72/task-orchestrator-public"
      public_base_branch:
        description: "base branch in public repo"
        required: false
        default: "main"
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout internal repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve inputs
        id: cfg
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "public_repo=${{ inputs.public_repo }}" >> "$GITHUB_OUTPUT"
            echo "public_base_branch=${{ inputs.public_base_branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "public_repo=T72/task-orchestrator-public" >> "$GITHUB_OUTPUT"
            echo "public_base_branch=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.cfg.outputs.public_repo }}
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: public-repo
          ref: ${{ steps.cfg.outputs.public_base_branch }}
          fetch-depth: 0

      - name: Check contract drift
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/public-repo-sync.sh
          scripts/public-repo-sync.sh check \
            --source "$PWD" \
            --target "$PWD/public-repo" \
            --allowlist ".github/public-sync-allowlist.txt" \
            --report "$PWD/drift-report.txt"

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-repo-drift-${{ github.run_id }}
          path: drift-report.txt
          if-no-files-found: ignore
