name: Promote To Public Repo

on:
  workflow_dispatch:
    inputs:
      public_repo:
        description: "owner/repo of public mirror"
        required: false
        default: "T72/task-orchestrator-public"
      public_base_branch:
        description: "base branch in public repo"
        required: false
        default: "main"
  release:
    types: [published]

permissions:
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout internal repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve inputs
        id: cfg
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "public_repo=${{ inputs.public_repo }}" >> "$GITHUB_OUTPUT"
            echo "public_base_branch=${{ inputs.public_base_branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "public_repo=T72/task-orchestrator-public" >> "$GITHUB_OUTPUT"
            echo "public_base_branch=main" >> "$GITHUB_OUTPUT"
          fi
          short_sha="$(git rev-parse --short=8 HEAD)"
          echo "sync_branch=sync/internal-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.cfg.outputs.public_repo }}
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: public-repo
          ref: ${{ steps.cfg.outputs.public_base_branch }}
          fetch-depth: 0

      - name: Sync allowlisted content
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/public-repo-sync.sh
          scripts/public-repo-sync.sh sync \
            --source "$PWD" \
            --target "$PWD/public-repo" \
            --allowlist ".github/public-sync-allowlist.txt"

      - name: Commit sync changes in public repo
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          cd public-repo
          git checkout -B "${{ steps.cfg.outputs.sync_branch }}"
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "sync: promote internal release content from ${{ github.repository }}@${{ github.sha }}"
          git push --force-with-lease origin "${{ steps.cfg.outputs.sync_branch }}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create or update PR in public repo
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          cd public-repo
          pr_url="$(gh pr list \
            --repo "${{ steps.cfg.outputs.public_repo }}" \
            --state open \
            --head "${{ steps.cfg.outputs.sync_branch }}" \
            --base "${{ steps.cfg.outputs.public_base_branch }}" \
            --json url --jq '.[0].url')"
          if [[ -n "${pr_url}" && "${pr_url}" != "null" ]]; then
            echo "PR already open: ${pr_url}"
            exit 0
          fi
          gh pr create \
            --repo "${{ steps.cfg.outputs.public_repo }}" \
            --base "${{ steps.cfg.outputs.public_base_branch }}" \
            --head "${{ steps.cfg.outputs.sync_branch }}" \
            --title "sync: promote release content from ${{ github.repository }}" \
            --body "Automated promotion from \`${{ github.repository }}\` commit \`${{ github.sha }}\` using allowlist contract."
